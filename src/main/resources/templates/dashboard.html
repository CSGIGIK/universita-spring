<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Segreteria</title>
</head>
<body>
    <h1>Segreteria Dashboard OK</h1>
    
    <!-- Pulsante Registrazione Studente -->
    <button onclick="window.location.href='/registrazione'">Registra Studente</button>
    
    <!-- Pulsante Logout (Form con CSRF token) -->
    <form method="post" th:action="@{/logout}" style="display:inline;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="logout-btn">Logout</button>
    </form>
</body>
</html>
